<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AgentCFO Demo Checkout</title>
    <link rel="stylesheet" href="css/styles.css" />
    <style>
      body { font-family: Inter, system-ui, sans-serif; max-width: 480px; margin: 48px auto; padding: 0 16px; background: #ecfdf3; }
      .card { background: #fff; border-radius: 18px; padding: 24px; border: 1px solid #e5e7eb; box-shadow: 0 8px 30px rgba(0,0,0,.06); }
      button { width: 100%; margin-top: 16px; padding: 14px; border: none; border-radius: 999px; background: #16a34a; color: #fff; font-weight: 700; cursor: pointer; }
    </style>
  </head>
  <body>
    <h1>Checkout</h1>
    <div class="card">
      <p><strong>Notion Team Plan</strong></p>
      <p>$96.00 / month</p>
      <p>Total: $96.00</p>
      <button type="button" id="place-order">Place Order</button>
    </div>
    <p style="font-size:0.82rem;color:#6b7280;margin-top:16px">Start <code>python api_server.py</code> then click Place Order.</p>
    <script src="js/apiClient.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/spoke_extension.js"></script>
    <script src="js/injectedOverlay.js"></script>
    <script src="js/demo-page.js"></script>
  </body>
</html>
