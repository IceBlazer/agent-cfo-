<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta property="og:site_name" content="GitHub Inc." />
    <title>GitHub Inc. | Checkout</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 520px;
        margin: 48px auto;
        padding: 0 16px;
      }
      .cart {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 20px;
      }
      button {
        width: 100%;
        margin-top: 16px;
        padding: 14px;
        font-size: 1rem;
        background: #2da44e;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Checkout</h1>
    <div class="cart">
      <p>Item: 10x GitHub Enterprise Seats - Price: $2,100/yr ($210/seat/year)</p>
      <p>Subtotal: $2,100.00</p>
      <p>Tax: $168.00</p>
      <p><strong>Total: $2,268.00</strong></p>
      <button type="submit">Place Order</button>
    </div>
  </body>
</html>
